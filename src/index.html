<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Engine - Editor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #111;
        color: #fff;
        font-family: monospace;
      }
      #container {
        display: flex;
        height: 100vh;
      }
      #canvas-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #sidebar {
        width: 300px;
        background: #222;
        padding: 20px;
        overflow-y: auto;
      }
      canvas {
        border: 2px solid #444;
        image-rendering: pixelated;
      }
      .stat {
        margin: 10px 0;
        padding: 10px;
        background: #333;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 10px;
        margin: 5px 0;
        background: #444;
        color: #fff;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background: #555;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
      </div>
      <div id="sidebar">
        <!-- Preenchido dinamicamente por adminPanel.js -->
        <p style="color:#666;font-size:11px;padding:10px;">Carregando painel...</p>
      </div>
    </div>

    <script type="module">
      import { AssetManager } from "./render/assetManager.js";
      import { loadAllSprites } from "./render/assetLoader.js";
      import {
        setupCanvas,
        centerCamera,
        buildFloorIndex,
        setAssetManagerRef,
      } from "./render/mapRenderer.js";
      import { renderWorld } from "./render/worldRenderer.js";
      import { WORLD_ENGINE, TILE_SIZE } from "./core/config.js";
      import { initWorldStore, getPlayers, getMonsters } from "./core/worldStore.js";
      import { initAdminPanel } from "./clients/world-engine/adminPanel.js";

      window.DEBUG_RENDER = false;

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const assets = new AssetManager();
      setAssetManagerRef(assets);

      let map = {};
      let floorIndex = null;
      let camera = { x: 0, y: 0 };
      let activeZ = 7;
      let animClock = 0;

      async function initialize() {
        setupCanvas(canvas, WORLD_ENGINE.canvasCols, WORLD_ENGINE.canvasRows);
        await loadAllSprites(assets, "./assets/");

        let mapRes = await fetch("./assets/map_compacto.json");
        if (!mapRes.ok) mapRes = await fetch("./assets_novo/map_compacto.json");
        map = await mapRes.json();
        floorIndex = buildFloorIndex(map);

        camera = centerCamera(
          { x: 100, y: 100 },
          WORLD_ENGINE.canvasCols,
          WORLD_ENGINE.canvasRows,
        );

        // Firebase live state
        initWorldStore();

        // Admin panel — injeta UI no #sidebar, conecta câmera
        initAdminPanel({
          camera,
          getGameTime: () => Date.now(),
          adminId: "worldengine",
          adminName: "WorldEngine",
          containerId: "sidebar",
        });

        // Atualiza badges de diagnóstico (tiles e atlas) após painel ser montado
        const elTiles = document.getElementById("stat-tiles");
        const elAtlas = document.getElementById("stat-atlas");
        if (elTiles) elTiles.textContent = Object.keys(map).length;
        if (elAtlas) elAtlas.textContent = assets.atlasCount;

        gameLoop();
      }

      // Expostos globalmente para os botões do painel (gerados pelo adminPanel)
      window.changeZ = (delta) => {
        activeZ = Math.max(0, Math.min(15, activeZ + delta));
        const el = document.getElementById("stat-z");
        if (el) el.textContent = activeZ;
      };

      window.toggleDebug = () => {
        window.DEBUG_RENDER = !window.DEBUG_RENDER;
      };

      function gameLoop() {
        animClock += 16;

        // Combina jogadores e monstros do worldStore para renderização ao vivo
        const livePlayers  = getPlayers()  ?? {};
        const liveMonsters = getMonsters() ?? {};
        const extraEntities = { ...livePlayers, ...liveMonsters };

        renderWorld({
          ctx,
          camX: camera.x * TILE_SIZE,
          camY: camera.y * TILE_SIZE,
          activeZ,
          animClock,
          ts: Date.now(),
          canvasW: canvas.width,
          canvasH: canvas.height,
          cols: WORLD_ENGINE.canvasCols,
          rows: WORLD_ENGINE.canvasRows,
          map,
          assets,
          anim: null,
          floorIndex,
          extraEntities,
          renderOptions: { showHP: true, showName: true },
        });

        requestAnimationFrame(gameLoop);
      }

      initialize();
    </script>
  </body>
</html>
